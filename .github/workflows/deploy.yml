name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - "pr-sorter/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy-main:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch sorter branches
        run: git fetch origin '+refs/heads/pr-sorter/*:refs/remotes/origin/pr-sorter/*'

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Compile Pages index helper
        run: npx tsc dev/pagesIndexWriter.ts --outDir .pages-tools --module NodeNext --target ES2022 --moduleResolution NodeNext --skipLibCheck --types node --ignoreConfig

      - name: Build main and all sorter branches
        shell: bash
        env:
          VITE_GOOGLE_API_KEY: ${{ vars.VITE_GOOGLE_API_KEY }}
        run: |
          set -euo pipefail

          rm -rf pages-dist dist
          node .pages-tools/pagesIndexWriter.js init

          git for-each-ref --format='%(refname:short)' refs/remotes/origin/pr-sorter/ | while read -r remote_branch; do
            branch="${remote_branch#origin/}"
            sorter="${branch#pr-sorter/}"
            slug="$(printf '%s' "$sorter" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9._-')"

            rm -rf customize dist "pages-dist/$slug"
            git checkout "origin/$branch" -- customize
            node .pages-tools/pagesIndexWriter.js add "$slug"

            npm run build:ci
            mkdir -p "pages-dist/$slug"
            cp -a dist/. "pages-dist/$slug/"
            mkdir -p "pages-dist/$slug/customize"
            cp customize/favicon.ico "pages-dist/$slug/customize/favicon.ico"
          done

          node .pages-tools/pagesIndexWriter.js write
          git checkout HEAD -- customize
          rm -rf dist
          VITE_SORTER_INDEX=true npm run build:ci
          cp -a dist/. pages-dist/

      - name: Deploy all builds
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-dist

  build-and-deploy-sorter:
    if: startsWith(github.ref_name, 'pr-sorter/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch sorter branches
        run: git fetch origin '+refs/heads/pr-sorter/*:refs/remotes/origin/pr-sorter/*'

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Compile Pages index helper
        run: npx tsc dev/pagesIndexWriter.ts --outDir .pages-tools --module NodeNext --target ES2022 --moduleResolution NodeNext --skipLibCheck --types node --ignoreConfig

      - name: Build sorter branch and index
        shell: bash
        env:
          VITE_GOOGLE_API_KEY: ${{ vars.VITE_GOOGLE_API_KEY }}
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME}"
          sorter="${branch#pr-sorter/}"
          slug="$(printf '%s' "$sorter" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9._-')"

          rm -rf customize dist pages-dist
          git checkout "origin/$branch" -- customize

          npm run build:ci
          mkdir -p "pages-dist/$slug"
          cp -a dist/. "pages-dist/$slug/"
          mkdir -p "pages-dist/$slug/customize"
          cp customize/favicon.ico "pages-dist/$slug/customize/favicon.ico"

          node .pages-tools/pagesIndexWriter.js init
          git for-each-ref --format='%(refname:short)' refs/remotes/origin/pr-sorter/ | while read -r remote_branch; do
            index_branch="${remote_branch#origin/}"
            index_sorter="${index_branch#pr-sorter/}"
            index_slug="$(printf '%s' "$index_sorter" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9._-')"

            rm -rf customize
            git checkout "origin/$index_branch" -- customize
            node .pages-tools/pagesIndexWriter.js add "$index_slug"
          done
          node .pages-tools/pagesIndexWriter.js write

          git checkout HEAD -- customize
          rm -rf dist
          VITE_SORTER_INDEX=true npm run build:ci
          cp -a dist/. pages-dist/

      - name: Deploy sorter build
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-dist
          keep_files: true
